<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza Tuning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/sport-car.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Forza Tuning</h1>
    <div class="panel-container">
        <div class="calc-section">
            <h2>Waga i Rozkład Masy</h2>

            <div class="calc-row">
                <div class="label-row">
                    <label for="weight-total">Waga całkowita pojazdu:</label>
                    <div class="number-container">
                        <input id="weight-total" class="number-input" type="number" min="500" max="3000" value="1200">
                        <span>kg</span>
                    </div>
                </div>
                <input id="weight-total-slider" class="custom-slider" type="range" min="500" max="3000" value="1200">
            </div>

            <div class="calc-row">
                <div class="label-row">
                    <label for="weight-front">Rozkład masy (przód):</label>
                    <div class="number-container">
                        <input id="weight-front" class="number-input" type="number" min="35" max="65" value="50">
                        <span>%</span>
                    </div>
                </div>
                <input id="weight-front-slider" class="custom-slider" type="range" min="35" max="65" value="50">
            </div>
        </div>

        <div class="calc-section">
            <h2>Specyfikacja Pojazdu</h2>
            <div class="double-input-row">
                <div class="input-group">
                    <label for="build-type">Typ budowanego auta:</label>
                    <div class="select-wrapper">
                        <select id="build-type" class="custom-select">
                            <option value="road">Wyścigi szosowe</option>
                            <option value="rally">Rajdy / Szuter</option>
                            <option value="offroad">Offroad</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="drivetrain">Rodzaj napędu:</label>
                    <div class="select-wrapper">
                        <select id="drivetrain" class="custom-select">
                            <option value="awd">AWD (4x4)</option>
                            <option value="rwd">RWD (Tył)</option>
                            <option value="fwd">FWD (Przód)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label for="tires-type">Rodzaj opon:</label>
                    <div class="select-wrapper">
                        <select id="tires-type" class="custom-select">
                            <option value="slick">Slick</option>
                            <option value="semislick">Semi-slick</option>
                            <option value="stock_street_rally">Fabryczne, uliczne, rajdowe</option>
                            <option value="offroad">Terenowe</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="calc-row">
                <div class="label-row">
                    <label for="areo-front">Areo - przód:</label>
                    <div class="number-container">
                        <input id="areo-front" class="number-input" type="number" min="0" max="200" value="100">
                        <span>KGF</span>
                    </div>
                </div>
                <input id="areo-front-slider" class="custom-slider" type="range" min="0" max="200" value="100">
            </div>
        </div>

        <button id="calc-btn" class="submit-btn">Oblicz ustawienia pojazdu</button>
    </div>

    <div id="results-section" class="panel-container">
        <h2>Ustawienia</h2>
    </div>


    <script type="module" src="js/app.js"></script>
</body>

</html>
